[pytest]
# Pytest configuration for CAS application

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum version
minversion = 8.0

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-branch
    --ignore=migrations
    -m "not e2e"

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, test multiple components)
    slow: Slow running tests
    auth: Authentication and authorization tests
    models: Database model tests
    views: View/route tests
    security: Security-related tests
    smoke: Quick smoke tests for basic functionality
    performance: Performance and optimization tests (TDD for Phase 3)
    e2e: Browser/Playwright end-to-end smoke tests (opt-in; excluded from default run via addopts, select with `pytest -m e2e`)
    # Module markers — run a single module: pytest -m accounts_payable
    accounts_payable: Accounts Payable / AP vouchers module
    sales_invoices: Sales invoices module
    receipts: Cash receipts and payments module
    cash_receipts: Cash Receipt Voucher (CRV) module e2e tests
    cash_disbursements: Cash Disbursement Voucher (CDV) module e2e tests
    journal_entries: Journal entries module
    journals: Journal views (AP journal, voucher journal)
    accounts: Chart of accounts module
    vendors: Vendors module
    customers: Customers module
    reports: Financial and BIR reports
    branches: Branch management
    users: User management and auth
    audit: Audit trail
    periods: Accounting periods
    vat_categories: VAT categories
    withholding_tax: Withholding tax codes
    settings: App settings / company settings

# Coverage settings
[coverage:run]
source = app
omit =
    */migrations/*
    */tests/*
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
