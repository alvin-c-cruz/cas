[pytest]
# Pytest configuration for CAS application

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum version
minversion = 8.0

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-branch
    --ignore=migrations

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, test multiple components)
    slow: Slow running tests
    auth: Authentication and authorization tests
    models: Database model tests
    views: View/route tests
    security: Security-related tests
    smoke: Quick smoke tests for basic functionality

# Coverage settings
[coverage:run]
source = app
omit =
    */migrations/*
    */tests/*
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
