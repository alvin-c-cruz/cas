[pytest]
# Pytest configuration for CAS application

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum version
minversion = 8.0

# pytest-asyncio: pin the default fixture loop scope so the plugin stops
# emitting a PytestDeprecationWarning on every run (we author no async tests;
# this just silences the unset-default nag).
asyncio_default_fixture_loop_scope = function

# Output options
# Coverage is NOT in addopts: instrumenting all of app/ + writing the HTML report
# on EVERY invocation taxed focused per-task TDD runs (the real cost, not TDD).
# Run coverage explicitly when you want it (the /run-tests skill does):
#   pytest --cov=app --cov-branch --cov-report=html --cov-report=term-missing
# Speed tip: pytest-xdist is available — add `-n auto` for the full suite, but
# pair it with an occasional single-threaded run: -n auto distributes tests across
# workers and can MASK test-ordering / isolation bugs (a P-56 DetachedInstanceError
# 500 hid as 2 cryptic errors under -n auto but was 26 failures single-threaded).
addopts =
    -v
    --strict-markers
    --tb=short
    --ignore=migrations
    -m "not e2e"

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, test multiple components)
    slow: Slow running tests
    auth: Authentication and authorization tests
    models: Database model tests
    views: View/route tests
    security: Security-related tests
    smoke: Quick smoke tests for basic functionality
    performance: Performance and optimization tests (TDD for Phase 3)
    e2e: Browser/Playwright end-to-end smoke tests (opt-in; excluded from default run via addopts, select with `pytest -m e2e`)
    # Module markers — run a single module: pytest -m accounts_payable
    accounts_payable: Accounts Payable / AP vouchers module
    sales_invoices: Sales invoices module
    receipts: Cash receipts and payments module
    cash_receipts: Cash Receipt Voucher (CRV) module e2e tests
    cash_disbursements: Cash Disbursement Voucher (CDV) module e2e tests
    sales_orders: Sales Order (SO) module
    sidebar_nav: Area-based sidebar navigation (build_sidebar / MODULE_REGISTRY area-group)
    journal_entries: Journal entries module
    journals: Journal views (AP journal, voucher journal)
    accounts: Chart of accounts module
    vendors: Vendors module
    customers: Customers module
    reports: Financial and BIR reports
    branches: Branch management
    users: User management and auth
    audit: Audit trail
    periods: Accounting periods
    vat_categories: VAT categories
    withholding_tax: Withholding tax codes
    settings: App settings / company settings

# Coverage settings
[coverage:run]
source = app
omit =
    */migrations/*
    */tests/*
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
