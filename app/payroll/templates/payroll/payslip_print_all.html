<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payslips — {{ run.run_number }}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 11px; color: #111; background: #fff; }
  .screen-only { }
  @media print {
    .screen-only { display: none !important; }
    @page { size: A4 portrait; margin: 15mm; }
  }
  .page-wrap { max-width: 740px; margin: 0 auto; padding: 24px; }
  .payslip-block { page-break-after: always; }
  .payslip-block:last-child { page-break-after: auto; }

  .ps-header { text-align: center; border-bottom: 2px solid #111; padding-bottom: 10px; margin-bottom: 12px; }
  .ps-header .company-name { font-size: 16px; font-weight: 700; letter-spacing: .5px; }
  .ps-header .company-sub { font-size: 10px; color: #444; margin-top: 2px; }
  .ps-header .doc-title { font-size: 14px; font-weight: 700; letter-spacing: 2px; margin-top: 8px; }

  .info-row { display: flex; gap: 16px; margin-bottom: 10px; }
  .info-row table { border-collapse: collapse; flex: 1; font-size: 10px; }
  .info-row td { border: 1px solid #aaa; padding: 3px 7px; }
  .info-row td.label { background: #f0f0f0; font-weight: 600; width: 42%; }

  .ps-cols { display: flex; gap: 12px; margin-bottom: 10px; }
  .ps-col { flex: 1; }
  .section-label { font-weight: 700; font-size: 10px; border: 1px solid #aaa; border-bottom: none; padding: 3px 7px; background: #f0f0f0; }
  .ps-table { width: 100%; border-collapse: collapse; font-size: 10px; }
  .ps-table td { border: 1px solid #aaa; padding: 3px 7px; }
  .ps-table td.amount { text-align: right; font-family: monospace; }
  .ps-table tr.totals { font-weight: 700; background: #f0f0f0; }
  .ps-ytd { margin-bottom: 12px; }

  .ps-net { display: flex; justify-content: space-between; align-items: center; border: 2px solid #111; padding: 8px 12px; margin: 10px 0; }
  .ps-net .netlabel { font-weight: 700; font-size: 12px; }
  .ps-net .netval { font-family: monospace; font-weight: 700; font-size: 15px; color: #1565c0; }

  .print-bar { margin-bottom: 20px; display: flex; gap: 8px; }
  .btn-print { padding: 8px 20px; background: #1565c0; color: #fff; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; }
  .btn-close { padding: 8px 20px; background: #666; color: #fff; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; text-decoration: none; display: inline-block; }
</style>
</head>
<body>
<div class="page-wrap">
  <div class="print-bar screen-only">
    <button class="btn-print" onclick="window.print()">Print All ({{ slips|length }})</button>
    <button type="button" class="btn-close" onclick="window.close()">Close</button>
  </div>
  {% for line, ytd in slips %}
  {% with line=line, ytd=ytd %}
  {% include "payroll/_payslip_body.html" %}
  {% endwith %}
  {% endfor %}
</div>
</body>
</html>
