{% extends "base.html" %}

{% block title %}Page Not Found - CAS{% endblock %}
{% block page_title %}404 - Page Not Found{% endblock %}

{% block content %}
<div style="text-align: center; padding: 80px 20px; max-width: 600px; margin: 0 auto;">
    <div style="font-size: 120px; font-weight: 800; color: #ddd; line-height: 1;">404</div>
    <h2 style="margin: 24px 0 16px; color: #333; font-size: 24px; font-weight: 600;">Page Not Found</h2>
    <p style="color: #666; font-size: 16px; line-height: 1.6; margin-bottom: 32px;">
        The page you're looking for doesn't exist or has been moved.
    </p>
    <div style="display: flex; gap: 12px; justify-content: center;">
        <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">
            Go to Dashboard
        </a>
        <a href="javascript:history.back()" class="btn btn-secondary">
            Go Back
        </a>
    </div>
</div>
{% endblock %}
