{# Inline "Add Product" quick-add modal for transaction forms. #}
<div id="productQuickAddOverlay"
     style="display:none; position:fixed; inset:0; background:var(--backdrop);
            z-index:1200; align-items:flex-start; justify-content:center; overflow:auto; padding:32px 16px;">
  <div style="background:var(--card); border-radius:8px; padding:24px; max-width:520px; width:100%;
              box-shadow:var(--shadow-md);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h3 style="margin:0; font-size:18px;">Add Product</h3>
      <button type="button" id="productQuickAddClose"
              style="background:none; border:none; font-size:22px; cursor:pointer; color:var(--text);"
              aria-label="Close">&times;</button>
    </div>

    <div id="productQuickAddError" class="form-error"
         style="display:none; margin-bottom:12px; color:var(--alert-error-text);"></div>

    <form id="productQuickAddForm" method="POST"
          action="{{ url_for('products.create') }}" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="is_active" value="1">
      <input type="hidden" name="default_unit_of_measure_id" value="">
      <input type="hidden" name="default_account_id" value="">

      <div class="form-row-2" style="margin-bottom:12px;">
        <div class="form-group">
          <label class="form-label" for="pqa_code">Code <span style="color:var(--alert-error-text);">*</span></label>
          <input type="text" id="pqa_code" name="code" class="form-control" maxlength="50" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="pqa_name">Name <span style="color:var(--alert-error-text);">*</span></label>
          <input type="text" id="pqa_name" name="name" class="form-control" maxlength="200" required>
        </div>
      </div>

      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label" for="pqa_price">Default Unit Price (₱, VAT-inclusive)</label>
        <input type="number" id="pqa_price" name="default_unit_price" class="form-control"
               min="0" step="0.01" placeholder="0.00">
      </div>

      <div style="display:flex; gap:12px; justify-content:flex-end;">
        <button type="button" id="productQuickAddCancel" class="btn btn-secondary">Cancel</button>
        <button type="submit" id="productQuickAddSubmit" class="btn btn-primary">Create</button>
      </div>
    </form>
  </div>
</div>
